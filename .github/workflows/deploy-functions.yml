name: Deploy Edge Functions

# Edge Functions deploy independently of the database. Without this, the
# deployed `media-proxy` function drifts behind the repo whenever its source
# changes (e.g. a new `action`), silently breaking the features that rely on it.
on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy media-proxy Edge Function
        run: supabase functions deploy media-proxy --project-ref ${{ vars.SUPABASE_PROJECT_REF }}

      - name: Deploy redeem-invite Edge Function
        run: supabase functions deploy redeem-invite --project-ref ${{ vars.SUPABASE_PROJECT_REF }}
